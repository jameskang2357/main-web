<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | James Kang</title>
    <meta name="description" content="Resume of James Kang, Infrastructure Engineer at Valon with prior experience at BILL and Avant building data platforms, pipelines, and cloud infrastructure.">
    <meta property="og:title" content="Resume | James Kang">
    <meta property="og:description" content="Infrastructure Engineer at Valon. Previously BILL and Avant. Terraform, Airflow, AWS, Kafka, Spark.">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="main.css">
    <style>
        main {
            padding: 3rem 4rem;
            margin-right: auto;
        }

        .resume-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .download-button {
            padding: 0.75rem 1.5rem;
            background: var(--text-primary);
            color: var(--bg-primary);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .download-button:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .resume-content {
            max-width: 760px;
            line-height: 1.8;
            font-size: 1rem;
        }

        .resume-header-section {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .resume-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .resume-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .resume-contact {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .resume-contact a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .resume-contact a:hover {
            color: var(--text-primary);
        }

        .resume-section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .experience-item,
        .education-item {
            margin-bottom: 2rem;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .item-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .item-company,
        .item-school {
            font-size: 1rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .item-date {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .item-description {
            color: var(--text-secondary);
            margin-top: 0.75rem;
            font-size: 0.95rem;
        }

        .item-description ul {
            margin-left: 1.5rem;
            margin-top: 0.5rem;
        }

        .item-description li {
            margin-bottom: 0.4rem;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .skill-tag {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            main {
                padding: 2rem 1.5rem;
            }

            .resume-name {
                font-size: 1.8rem;
            }

            .resume-contact {
                gap: 1rem;
                font-size: 0.85rem;
            }
        }

        @media print {
            aside,
            .download-button,
            .nav-toggle {
                display: none !important;
            }

            main {
                margin-left: 0 !important;
                padding: 1rem !important;
                max-width: 100% !important;
            }

            body {
                background: white !important;
                color: black !important;
            }

            .skill-tag {
                border: 1px solid #ccc !important;
            }

            a {
                color: inherit !important;
                text-decoration: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside>
            <div class="nav-header">
                <a href="/" class="logo">James Kang</a>
                <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="toggleNav()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <div class="nav-body" id="nav-body">
                <nav>
                    <a href="/">Home</a>
                    <a href="projects.html">Projects</a>
                    <a href="articles.html">Writing</a>
                    <a href="now.html">Now</a>
                    <a href="resume.html" class="active">Resume</a>
                </nav>
                <div class="social">
                    <a href="#" id="email-link" onclick="copyEmail(event)">Email</a>
                    <a href="https://github.com/jameskang2357" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://www.linkedin.com/in/jameskang2357" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                </div>
            </div>
        </aside>
        <main>
            <div class="resume-header">
                <h1 class="page-title">Resume</h1>
                <a href="img/resume.pdf" download="James_Kang_Resume.pdf" class="download-button">
                    ↓ Download PDF
                </a>
            </div>
            <div class="resume-content" id="resume-content"></div>
        </main>
    </div>
    <script src="main.js"></script>
    <script>
        const resumeData = {
            name: "James Kang",
            title: "Infrastructure Engineer",
            contact: {
                email: "jameskang2357@gmail.com",
                phone: "(541) 221-6780",
                github: "https://github.com/jameskang2357",
                linkedin: "https://www.linkedin.com/in/jameskang2357"
            },
            experience: [
                {
                    title: "Infrastructure Engineer",
                    company: "Valon",
                    location: "",
                    startDate: "Feb 2026",
                    endDate: "current",
                    achievements: [
                        "Led migration from GitLab to GitHub across 10+ repositories, including automated conversion of 10,000+ merge requests to pull requests using custom scripts, achieving zero downtime despite API rate limits",
                        "Established observability for ~100 Airflow DAGs by implementing Datadog log ingestion, creating monitoring dashboards, and integrating Slack-based failure alerts",
                        "Designed and implemented multi-tenant data architecture supporting 25 to 50 TB across 300+ tables, enabling secure onboarding of new tenants while maintaining strict data isolation",
                        "Introduced infrastructure-as-code using Terraform (OpenTofu) across 8+ environments (prod, staging, tenant-specific), standardizing deployments and enabling scalable environment provisioning",
                        "Developed infrastructure for an LLM-powered internal cloud agent (4,000+ daily Slack invocations), improving issue triage speed and enforcing data security via deterministic credential filtering and compliance-aligned SLAs"
                    ]
                },
                {
                    title: "Data Engineer",
                    company: "BILL",
                    location: "",
                    startDate: "Feb 2022",
                    endDate: "Dec 2025",
                    achievements: [
                        "Owned and scaled batch and real-time data pipelines processing multiple terabytes of data daily and high-throughput event streams using AWS Kinesis, Kafka, Flink, Glue, and EMR",
                        "Designed low-latency streaming architectures enabling near real-time data availability for AI, billing, risk, and compliance systems",
                        "Reduced AWS costs by 20%+ through compute optimization, partitioning strategies, and storage tuning across large-scale data workloads",
                        "Implemented data quality frameworks (e.g., Great Expectations) and monitoring systems, strengthening SLAs and improving data reliability across critical pipelines",
                        "Built secure cross-account data access patterns using IAM roles, enabling compliant data sharing across internal teams and external partners"
                    ]
                },
                {
                    title: "Software Developer",
                    company: "Avant",
                    location: "",
                    startDate: "Nov 2020",
                    endDate: "Feb 2022",
                    achievements: [
                        "Built and deployed full-stack features using Kotlin, REST APIs, Kubernetes, and React, improving system performance and user experience",
                        "Developed and productionized ML data pipelines, reducing hiring costs by 30%, improving model accuracy by 10%, and cutting training and data extraction time by 40%+"
                    ]
                }
            ],
            education: [
                {
                    degree: "B.S. in Computer Science",
                    school: "University of Oregon",
                    location: "Eugene, OR",
                    graduationDate: "2020",
                    description: "Minor in Business Administration"
                }
            ],
            skills: [
                "Python", "SQL", "Apache Spark", "Terraform", "Docker", "Airflow",
                "Apache Kafka", "Kinesis", "Firehose", "Glue", "EMR", "AWS", "GCP",
                "Datadog", "Oracle", "Microsoft SQL Server", "PostgreSQL", "DynamoDB"
            ]
        };

        function renderResume() {
            const container = document.getElementById('resume-content');

            let html = '<div class="resume-header-section">' +
                '<div class="resume-name">' + resumeData.name + '</div>' +
                '<div class="resume-title">' + resumeData.title + '</div>' +
                '<div class="resume-contact">' +
                (resumeData.contact.phone ? '<span>' + resumeData.contact.phone + '</span>' : '') +
                '<a href="mailto:' + resumeData.contact.email + '">' + resumeData.contact.email + '</a>' +
                '<a href="' + resumeData.contact.github + '" target="_blank" rel="noopener noreferrer">GitHub</a>' +
                '<a href="' + resumeData.contact.linkedin + '" target="_blank" rel="noopener noreferrer">LinkedIn</a>' +
                '</div></div>';

            if (resumeData.experience && resumeData.experience.length > 0) {
                html += '<div class="resume-section"><div class="section-title">Employment</div>';
                resumeData.experience.forEach(function (exp) {
                    html += '<div class="experience-item">' +
                        '<div class="item-header"><div>' +
                        '<div class="item-title">' + exp.title + '</div>' +
                        '<div class="item-company">' + exp.company + (exp.location ? ' · ' + exp.location : '') + '</div>' +
                        '</div><div class="item-date">' + exp.startDate + ' – ' + (exp.endDate === 'current' ? 'present' : exp.endDate) + '</div></div>' +
                        (exp.achievements && exp.achievements.length > 0
                            ? '<div class="item-description"><ul>' + exp.achievements.map(function (a) { return '<li>' + a + '</li>'; }).join('') + '</ul></div>'
                            : '') +
                        '</div>';
                });
                html += '</div>';
            }

            if (resumeData.education && resumeData.education.length > 0) {
                html += '<div class="resume-section"><div class="section-title">Education</div>';
                resumeData.education.forEach(function (edu) {
                    html += '<div class="education-item">' +
                        '<div class="item-header"><div>' +
                        '<div class="item-title">' + edu.degree + '</div>' +
                        '<div class="item-school">' + edu.school + (edu.location ? ' · ' + edu.location : '') + '</div>' +
                        '</div><div class="item-date">' + edu.graduationDate + '</div></div>' +
                        (edu.description ? '<div class="item-description">' + edu.description + '</div>' : '') +
                        '</div>';
                });
                html += '</div>';
            }

            if (resumeData.skills && resumeData.skills.length > 0) {
                html += '<div class="resume-section"><div class="section-title">Skills</div>' +
                    '<div class="skills-list">' +
                    resumeData.skills.map(function (s) { return '<span class="skill-tag">' + s + '</span>'; }).join('') +
                    '</div></div>';
            }

            container.innerHTML = html;
        }

        renderResume();
    </script>
</body>
</html>
