<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume — James Kang</title>
    <meta name="description" content="Resume of James Kang, Data Engineer with experience at BILL and Avant building scalable pipelines and full-stack systems.">
    <meta property="og:title" content="Resume — James Kang">
    <meta property="og:description" content="Data Engineer with experience at BILL and Avant. AWS, Kafka, Flink, Kotlin, React.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="main.css">
    <style>
        main {
            padding: 3rem 4rem;
            margin-right: auto;
        }

        .resume-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .download-button {
            padding: 0.75rem 1.5rem;
            background: var(--text-primary);
            color: var(--bg-primary);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .download-button:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .resume-content {
            max-width: 760px;
            line-height: 1.8;
            font-size: 1rem;
        }

        .resume-header-section {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .resume-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .resume-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .resume-contact {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .resume-contact a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .resume-contact a:hover {
            color: var(--text-primary);
        }

        .resume-section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .experience-item,
        .education-item {
            margin-bottom: 2rem;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .item-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .item-company,
        .item-school {
            font-size: 1rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .item-date {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .item-description {
            color: var(--text-secondary);
            margin-top: 0.75rem;
            font-size: 0.95rem;
        }

        .item-description ul {
            margin-left: 1.5rem;
            margin-top: 0.5rem;
        }

        .item-description li {
            margin-bottom: 0.4rem;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .skill-tag {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            main {
                padding: 2rem 1.5rem;
            }

            .resume-name {
                font-size: 1.8rem;
            }

            .resume-contact {
                gap: 1rem;
                font-size: 0.85rem;
            }
        }

        @media print {
            aside,
            .download-button,
            .nav-toggle {
                display: none !important;
            }

            main {
                margin-left: 0 !important;
                padding: 1rem !important;
                max-width: 100% !important;
            }

            body {
                background: white !important;
                color: black !important;
            }

            .skill-tag {
                border: 1px solid #ccc !important;
            }

            a {
                color: inherit !important;
                text-decoration: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside>
            <div class="nav-header">
                <a href="/" class="logo">James Kang</a>
                <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="toggleNav()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <div class="nav-body" id="nav-body">
                <nav>
                    <a href="/">Home</a>
                    <a href="projects.html">Projects</a>
                    <a href="articles.html">Writing</a>
                    <a href="resume.html" class="active">Resume</a>
                </nav>
                <div class="social">
                    <a href="#" id="email-link" onclick="copyEmail(event)">Email</a>
                    <a href="https://github.com/jameskang2357" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://www.linkedin.com/in/jameskang2357" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                </div>
            </div>
        </aside>
        <main>
            <div class="resume-header">
                <h1 class="page-title">Resume</h1>
                <a href="img/resume.pdf" download="James_Kang_Resume.pdf" class="download-button">
                    ↓ Download PDF
                </a>
            </div>
            <div class="resume-content" id="resume-content"></div>
        </main>
    </div>
    <script src="main.js"></script>
    <script>
        const resumeData = {
            name: "James Kang",
            title: "Data Engineer",
            contact: {
                email: "jameskang2357@gmail.com",
                phone: "(541) 221-6780",
                github: "https://github.com/jameskang2357",
                linkedin: "https://www.linkedin.com/in/jameskang2357"
            },
            experience: [
                {
                    title: "Data Engineer",
                    company: "BILL",
                    location: "",
                    startDate: "Feb 2022",
                    endDate: "current",
                    achievements: [
                        "Own and maintain batch and streaming pipelines ingesting from Oracle, MySQL, DynamoDB, and third-party sources into a centralised data platform",
                        "Designed and scaled near real-time streaming pipelines using AWS Kinesis, Apache Kafka, Flink, Glue, Firehose, and EMR, enabling data freshness across AI, billing, risk, compliance, and finance teams",
                        "Modernized legacy ETL workflows by upgrading AWS Glue, Airflow, and Spark, improving reliability, reducing job runtimes, and cutting operational overhead",
                        "Drove AWS cost-optimization initiatives, achieving 20%+ quarterly savings through workload tuning, storage optimization, and scaling",
                        "Developed monitoring, alerting, and automated quality checks for data pipelines, improving system reliability and ensuring high data accuracy",
                        "Implemented secure cross-account IAM roles and data-sharing patterns, enabling safe and compliant access across internal teams and partner accounts",
                        "Partnered with engineering, finance, risk, and compliance teams to deliver scalable data solutions that support analytics, reporting, and operational workflows"
                    ]
                },
                {
                    title: "Software Developer",
                    company: "Avant",
                    location: "",
                    startDate: "Oct 2020",
                    endDate: "Feb 2022",
                    achievements: [
                        "Delivered end-to-end features as a full-stack developer using Kotlin, RESTful APIs, Kubernetes, and React, improving system reliability and user experience",
                        "Contributed across the software development lifecycle, from defining requirements to deploying finished products",
                        "Worked with QA and development teams to enhance and automate testing processes, increasing efficiency and documentation quality",
                        "Integrated machine learning algorithms into applications, helping reduce hiring costs by 30%",
                        "Built and managed pipelines to deploy and maintain models smoothly in production",
                        "Found and applied improvements that cut training time by 20% and boosted overall model quality and data accuracy",
                        "Analysed data features to identify patterns and improve data quality, resulting in a 10% increase in model accuracy"
                    ]
                }
            ],
            education: [
                {
                    degree: "B.S. in Computer Science",
                    school: "University of Oregon",
                    location: "Eugene, OR",
                    graduationDate: "2020",
                    description: "Minor in Business Administration"
                }
            ],
            skills: [
                "AWS", "Kinesis", "Apache Kafka", "Flink", "Glue", "Firehose", "EMR",
                "Kotlin", "React", "Kubernetes", "RESTful APIs", "Airflow", "Spark",
                "Oracle", "MySQL", "DynamoDB", "ETL", "Data Pipelines", "Machine Learning"
            ]
        };

        function renderResume() {
            const container = document.getElementById('resume-content');

            let html = '<div class="resume-header-section">' +
                '<div class="resume-name">' + resumeData.name + '</div>' +
                '<div class="resume-title">' + resumeData.title + '</div>' +
                '<div class="resume-contact">' +
                (resumeData.contact.phone ? '<span>' + resumeData.contact.phone + '</span>' : '') +
                '<a href="mailto:' + resumeData.contact.email + '">' + resumeData.contact.email + '</a>' +
                '<a href="' + resumeData.contact.github + '" target="_blank" rel="noopener noreferrer">GitHub</a>' +
                '<a href="' + resumeData.contact.linkedin + '" target="_blank" rel="noopener noreferrer">LinkedIn</a>' +
                '</div></div>';

            if (resumeData.experience && resumeData.experience.length > 0) {
                html += '<div class="resume-section"><div class="section-title">Employment</div>';
                resumeData.experience.forEach(function (exp) {
                    html += '<div class="experience-item">' +
                        '<div class="item-header"><div>' +
                        '<div class="item-title">' + exp.title + '</div>' +
                        '<div class="item-company">' + exp.company + (exp.location ? ' · ' + exp.location : '') + '</div>' +
                        '</div><div class="item-date">' + exp.startDate + ' – ' + (exp.endDate === 'current' ? 'present' : exp.endDate) + '</div></div>' +
                        (exp.achievements && exp.achievements.length > 0
                            ? '<div class="item-description"><ul>' + exp.achievements.map(function (a) { return '<li>' + a + '</li>'; }).join('') + '</ul></div>'
                            : '') +
                        '</div>';
                });
                html += '</div>';
            }

            if (resumeData.education && resumeData.education.length > 0) {
                html += '<div class="resume-section"><div class="section-title">Education</div>';
                resumeData.education.forEach(function (edu) {
                    html += '<div class="education-item">' +
                        '<div class="item-header"><div>' +
                        '<div class="item-title">' + edu.degree + '</div>' +
                        '<div class="item-school">' + edu.school + (edu.location ? ' · ' + edu.location : '') + '</div>' +
                        '</div><div class="item-date">' + edu.graduationDate + '</div></div>' +
                        (edu.description ? '<div class="item-description">' + edu.description + '</div>' : '') +
                        '</div>';
                });
                html += '</div>';
            }

            if (resumeData.skills && resumeData.skills.length > 0) {
                html += '<div class="resume-section"><div class="section-title">Skills</div>' +
                    '<div class="skills-list">' +
                    resumeData.skills.map(function (s) { return '<span class="skill-tag">' + s + '</span>'; }).join('') +
                    '</div></div>';
            }

            container.innerHTML = html;
        }

        renderResume();
    </script>
</body>
</html>
