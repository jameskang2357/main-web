<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — James Kang</title>
    <meta name="description" content="Projects by James Kang — data engineering, AI, and software development work from school and side projects.">
    <meta property="og:title" content="Projects — James Kang">
    <meta property="og:description" content="Things I've built — predictive keyboards, AI agents, COVID trackers, and database systems.">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="main.css">
    <style>
        main {
            max-width: 1100px;
        }

        .page-title {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 4rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            border-color: var(--text-secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            .project-card:hover {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            }
        }

        .project-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .project-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 1.25rem;
            flex: 1;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        .tech-tag {
            background: var(--bg-primary);
            color: var(--text-secondary);
            padding: 0.3rem 0.65rem;
            border-radius: 4px;
            font-size: 0.8rem;
            border: 1px solid var(--border-color);
        }

        .project-links {
            display: flex;
            gap: 1.25rem;
            margin-top: auto;
        }

        .project-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .project-link:hover {
            color: var(--text-primary);
        }

        .project-link::after {
            content: " →";
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside>
            <div class="nav-header">
                <a href="/" class="logo">James Kang</a>
                <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="toggleNav()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <div class="nav-body" id="nav-body">
                <nav>
                    <a href="/">Home</a>
                    <a href="projects.html" class="active">Projects</a>
                    <a href="articles.html">Writing</a>
                    <a href="now.html">Now</a>
                    <a href="resume.html">Resume</a>
                </nav>
                <div class="social">
                    <a href="#" id="email-link" onclick="copyEmail(event)">Email</a>
                    <a href="https://github.com/jameskang2357" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://www.linkedin.com/in/jameskang2357" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                </div>
            </div>
        </aside>
        <main>
            <h1 class="page-title">Projects</h1>
            <p class="page-subtitle">Things I've built and shipped</p>
            <div class="projects-grid" id="projects-container"></div>
        </main>
    </div>
    <script src="main.js"></script>
    <script>
        const projects = [
            {
                title: "Smart Keyboard",
                description: "A predictive keyboard with word completion and next-word prediction. Built with C for optimal performance using trie data structures.",
                tech: ["C", "Ncurses", "Data Structures"],
                github: "https://bitbucket.org/mcampbe3/cis330_project_group_7/src/master/",
                demo: null
            },
            {
                title: "AI Pacman",
                description: "Three projects teaching AI fundamentals including search algorithms, multi-agent systems, and reinforcement learning.",
                tech: ["Python", "AI", "Machine Learning"],
                github: "https://github.com/jameskang2357/Pacman",
                demo: null
            },
            {
                title: "COVID-19 Tracker",
                description: "Interactive visualization of COVID-19 spread using scientific visualization techniques.",
                tech: ["Python", "Data Visualization"],
                github: "https://github.com/jameskang2357/Covid19tracker",
                demo: null
            },
            {
                title: "Uber Database System",
                description: "Fictional database for Uber and Uber Eats with unified queue system for drivers across both services.",
                tech: ["SQL", "Database Design"],
                github: "https://github.com/jameskang2357/CIS451finalproj",
                demo: null
            }
        ];

        function renderProjects() {
            const container = document.getElementById('projects-container');
            projects.forEach(function (project) {
                const card = document.createElement('div');
                card.className = 'project-card';

                const techTags = project.tech.map(function (t) {
                    return '<span class="tech-tag">' + t + '</span>';
                }).join('');

                const links = [];
                if (project.github) {
                    links.push('<a href="' + project.github + '" class="project-link" target="_blank" rel="noopener noreferrer">GitHub</a>');
                }
                if (project.demo) {
                    links.push('<a href="' + project.demo + '" class="project-link" target="_blank" rel="noopener noreferrer">Demo</a>');
                }

                card.innerHTML =
                    '<h3 class="project-title">' + project.title + '</h3>' +
                    '<p class="project-description">' + project.description + '</p>' +
                    '<div class="project-tech">' + techTags + '</div>' +
                    '<div class="project-links">' + links.join('') + '</div>';

                container.appendChild(card);
            });
        }

        renderProjects();
    </script>
</body>
</html>
